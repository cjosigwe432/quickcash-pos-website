<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Calculator</title>

<style>
body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.calculator {
    width: 320px;
}

.display {
    color: white;
    font-size: 60px;
    text-align: right;
    padding: 20px;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 10px;
}

button {
    height: 70px;
    border-radius: 50%;
    border: none;
    font-size: 24px;
}

.gray { background: #a5a5a5; }
.dark { background: #333; color: white; }
.orange { background: #ff9500; color: white; }

.zero {
    grid-column: span 2;
    border-radius: 40px;
}
</style>
</head>

<body>

<div class="calculator">
    <div id="display" class="display">0</div>

    <div class="buttons">
        <button class="gray" onclick="clearAll()">AC</button>
<button class="gray" onclick="addBracket('(')">(</button>
<button class="gray" onclick="addBracket(')')">)</button>
<button class="orange" onclick="setOperator('/')">÷</button>

        <button class="dark" onclick="press(7)">7</button>
        <button class="dark" onclick="press(8)">8</button>
        <button class="dark" onclick="press(9)">9</button>
        <button class="orange" onclick="setOperator('*')">×</button>

        <button class="dark" onclick="press(4)">4</button>
        <button class="dark" onclick="press(5)">5</button>
        <button class="dark" onclick="press(6)">6</button>
        <button class="orange" onclick="setOperator('-')">−</button>

        <button class="dark" onclick="press(1)">1</button>
        <button class="dark" onclick="press(2)">2</button>
        <button class="dark" onclick="press(3)">3</button>
        <button class="orange" onclick="setOperator('+')">+</button>

        <button class="dark zero" onclick="press(0)">0</button>
        <button class="dark" onclick="dot()">.</button>
        <button class="orange" onclick="equal()">=</button>
    </div>
</div>

<script>
let display = document.getElementById("display");

let expression = "";
let display = document.getElementById("display");

function update() {
    display.innerText = expression || "0";
}

// Numbers
function press(num) {
    expression += num;
    update();
}

// Dot
function dot() {
    expression += ".";
    update();
}

// Operators
function setOperator(op) {
    if (expression === "") return;

    let last = expression.slice(-1);

    // prevent double operators like ++ or **
    if ("+-*/".includes(last)) {
        expression = expression.slice(0, -1);
    }

    expression += op;
    update();
}

// Brackets ✅ (NEW)
function addBracket(br) {
    expression += br;
    update();
}

// Clear
function clearAll() {
    expression = "";
    update();
}

// Equal
function equal() {
    try {
        let result = solveExpression(expression);
        expression = result.toString();
    } catch {
        expression = "Error";
    }
    update();
}

// ⭐⭐⭐ REAL MATH SOLVER ⭐⭐⭐
function solveExpression(expr) {

    // STEP 1: Solve brackets first (recursive)
    while (expr.includes("(")) {
        expr = expr.replace(/\(([^()]+)\)/g, (match, inner) => {
            return solveExpression(inner);
        });
    }

    // STEP 2: Split numbers & operators
    let numbers = expr.split(/[\+\-\*\/]/).map(Number);
    let operators = expr.match(/[\+\-\*\/]/g);

    if (!operators) return numbers[0];

    // STEP 3: Handle × and ÷
    for (let i = 0; i < operators.length; i++) {
        if (operators[i] === "*" || operators[i] === "/") {
            let result;

            if (operators[i] === "*") {
                result = numbers[i] * numbers[i + 1];
            } else {
                if (numbers[i + 1] === 0) return "Error";
                result = numbers[i] / numbers[i + 1];
            }

            numbers.splice(i, 2, result);
            operators.splice(i, 1);
            i--;
        }
    }

    // STEP 4: Handle + and -
    let result = numbers[0];
    for (let i = 0; i < operators.length; i++) {
        if (operators[i] === "+") result += numbers[i + 1];
        if (operators[i] === "-") result -= numbers[i + 1];
    }

    return result;

// Equal
function equal() {
    try {
        let result = solveExpression(expression);
        expression = result.toString();
        update();
    } catch {
        expression = "Error";
        update();
    }

}
</script>

</body>
</html>
