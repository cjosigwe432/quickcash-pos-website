        :root {

        .action-btn {
            background: rgba(255, 255, 255, 0.08);

            border-radius: 16px;

        .action-btn:hover {

            transform: translateY(-3px);
        }
        .send-section {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            margin-bottom: 12px;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: #000;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s;

            padding: 12px 0;
            max-width: 420px;
            margin: 0 auto;

            text-align: center;

<body>

<h2>NeoBank</h2>
<div class="container">
    <!-- AUTH SCREEN -->

                Secured by Firebase • Nigerian Neobank
            </p>
        </div>
    </div>
    <!-- DASHBOARD -->
    <div id="dashboardScreen" class="hidden">

<!-- AUTH -->
<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
        <header>
            <div class="logo">NeoBank</div>

        <!-- Quick Actions -->

        <div class="action-buttons">

</div>

<script>

// Initialize Firebase
firebase.initializeApp(firebaseConfig);

// SIGNUP
// ====================== AUTH FUNCTIONS ======================
function signup() {

// LOGIN
function login() {
  auth.signInWithEmailAndPassword(email.value, password.value);

    const password = document.getElementById("password").value;
    auth.signInWithEmailAndPassword(email, password)

            alert(error.message);
        });
}

// LOGOUT
function logout() {
  auth.signOut();
    auth.signOut();
}

// AUTH STATE
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("auth").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
// ====================== DASHBOARD & REAL-TIME BALANCE ======================
auth.onAuthStateChanged((user) => {
    if (user) {
        document.getElementById("authScreen").classList.add("hidden");
        document.getElementById("dashboardScreen").classList.remove("hidden");
        document.getElementById("bottomNav").classList.remove("hidden");

    db.collection("users").doc(user.uid).onSnapshot(doc => {
      document.getElementById("balance").innerText = doc.data().balance;
    });
  } else {
    document.getElementById("auth").classList.remove("hidden");
    document.getElementById("dashboard").classList.add("hidden");
  }
        // Real-time balance listener
        db.collection("users").doc(user.uid).onSnapshot((doc) => {
            if (doc.exists) {
                const balance = doc.data().balance || 0;
                document.getElementById("balance").innerText = balance.toLocaleString('en-NG', {minimumFractionDigits: 2});
            }
        });
    } else {
        document.getElementById("authScreen").classList.remove("hidden");
        document.getElementById("dashboardScreen").classList.add("hidden");
        document.getElementById("bottomNav").classList.add("hidden");
    }
});

// SEND MONEY
// ====================== SEND MONEY (with transaction safety) ======================
function sendMoney() {
  const amount = parseInt(document.getElementById("amount").value);
  const user = auth.currentUser;
    const recipientEmail = document.getElementById("recipientEmail").value.trim();
    const amount = parseFloat(document.getElementById("sendAmount").value);

  const ref = db.collection("users").doc(user.uid);
    if (!recipientEmail || !amount || amount <= 0) {
        alert("Please enter valid recipient and amount");
        return;
    }

  db.runTransaction(async (t) => {
    const doc = await t.get(ref);
    let balance = doc.data().balance;
    const user = auth.currentUser;
    if (!user) return;

    if (amount > balance) {
      alert("Insufficient funds");
      return;
    }
    const userRef = db.collection("users").doc(user.uid);

    balance -= amount;
    t.update(ref, { balance });
  });
    db.runTransaction(async (transaction) => {
        const userDoc = await transaction.get(userRef);
        if (!userDoc.exists) throw "User document does not exist";
        const currentBalance = userDoc.data().balance || 0;
        if (currentBalance < amount) {
            throw "Insufficient balance";
        }
        // Update sender balance
        transaction.update(userRef, {
            balance: currentBalance - amount
        });
        // In a real app, you would also create a transaction record and notify recipient
        console.log(`Sent ₦${amount} to ${recipientEmail}`);
    }).then(() => {
        alert(`₦${amount.toLocaleString()} sent successfully!`);
        document.getElementById("sendAmount").value = "";
        document.getElementById("recipientEmail").value = "";
    }).catch((error) => {
        alert(error === "Insufficient balance" ? "Insufficient funds" : error);
    });
}
